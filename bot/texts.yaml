# ==========================================
# УВЕДОМЛЕНИЯ (Рассылки)
# ==========================================
notifications:
  new_proposal: |
    🔔 **Новое предложение в тендере #{tender_id}!**

    👤 Участник #{user_id} предложил:
    {text}

    Вы можете перебить ставку!
    
  winner_congrats: |
    🎉 <b>Поздравляем!</b>

    Ваше предложение по тендеру <b>#{tender_id}</b> было выбрано победным! В ближайшее время администратор свяжется с вами для обсуждения деталей.
    
  loser_notify: |
    🔔 <b>Тендер #{tender_id} завершен!</b>

    К сожалению, в этот раз заказчик выбрал другого исполнителя. Не расстраивайтесь, впереди еще много интересных проектов!