# ==========================================
# УВЕДОМЛЕНИЯ (Рассылки)
# ==========================================
notifications:
  new_proposal: |
    🔔 <b>Нова пропозиція в тендері #{tender_id}!</b>

    👤 Учасник <code>{user_id}</code> запропонував:
    {text}

    Ви можете перебити ставку!

  admin_addition: |

    ℹ️ <b>Інформація про учасника:</b>
    👤 Ім'я: {nickname}{username_str}
    🆔 ID: <code>{telegram_id}</code>
    
  winner_congrats: |
    🎉 <b>Вітаємо!</b>

    Ваша пропозиція щодо тендеру <b>#{tender_id}</b> була обрана переможною!
    Найближчим часом адміністратор зв'яжеться з вами для обговорення деталей.
    
  loser_notify: |
    🔔 <b>Тендер #{tender_id} завершено!</b>

    На жаль, цього разу замовник обрав іншого виконавця.
    Не засмучуйтесь, попереду ще багато цікавих проєктів!