# ==========================================
# УВЕДОМЛЕНИЯ (Рассылки)
# ==========================================
notifications:
  new_proposal: |
    🔔 <b>Новое предложение в тендере #{tender_id}!</b>

    👤 Участник <code>{user_id}</code> предложил:
    {text}

    Вы можете перебить ставку!

  admin_addition: |

    ℹ️ <b>Информация об участнике:</b>
    👤 Имя: {nickname}{username_str}
    🆔 ID: <code>{telegram_id}</code>
    
  winner_congrats: |
    🎉 <b>Поздравляем!</b>

    Ваше предложение по тендеру <b>#{tender_id}</b> было выбрано победным!
    В ближайшее время администратор свяжется с вами для обсуждения деталей.
    
  loser_notify: |
    🔔 <b>Тендер #{tender_id} завершен!</b>

    К сожалению, в этот раз заказчик выбрал другого исполнителя.
    Не расстраивайтесь, впереди еще много интересных проектов!